<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMU Hostel Booking System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .step-active { background-color: #1e40af; color: white; }
    .room-btn { transition: all 0.2s; }
    .room-btn:hover { transform: scale(1.08); background-color: #dbeafe; }
    .room-booked { background-color: #f3f4f6; cursor: not-allowed; color: #9ca3af; }
  </style>
</head>
<body class="bg-gray-50 p-4">

  <nav class="bg-blue-900 text-white p-4 rounded-xl mb-6">
    <div class="flex items-center gap-3">
      <img src="https://i.ibb.co/0jXzK7K/mmu-logo.png" alt="MMU" class="h-12">
      <h1 class="text-2xl font-bold">MMU Hostel Booking</h1>
    </div>
  </nav>

  <div id="booking" class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
    <div class="bg-blue-900 text-white p-8 text-center">
      <h2 class="text-3xl font-bold">Hostel Booking</h2>
    </div>

    <div class="p-8">
      <!-- Room Selection Area -->
      <div class="mb-8">
        <h3 class="text-xl font-semibold mb-4">Choose Block</h3>
        <div class="grid grid-cols-5 gap-4" id="block-options"></div>
      </div>

      <div id="room-type-area" class="hidden mb-8">
        <h3 class="text-xl font-semibold mb-4">Choose Room Type</h3>
        <div class="grid grid-cols-3 gap-4" id="room-type-options"></div>
      </div>

      <div id="room-number-area" class="hidden">
        <h3 class="text-xl font-semibold mb-4">Choose Room Number in <span id="current-block" class="text-blue-600"></span></h3>
        <p class="text-sm text-gray-600 mb-4">Available Rooms: <span id="vacant-count" class="font-bold text-green-600"></span></p>
        <div class="grid grid-cols-10 gap-2 max-h-80 overflow-y-auto p-4 border rounded-2xl bg-gray-50" id="room-grid"></div>
      </div>

      <!-- Payment -->
      <div class="mt-10 bg-green-50 border border-green-300 p-8 rounded-2xl">
        <p class="font-bold text-lg">Send Money via M-Pesa to:</p>
        <p class="text-5xl font-bold text-green-700 mt-4">0783367057</p>
        <p class="text-xl mt-2">Judy Wandii</p>
      </div>

      <button onclick="submitBooking()" 
              class="mt-8 w-full bg-green-600 text-white py-6 rounded-2xl text-xl font-bold">
        Submit Booking
      </button>
    </div>
  </div>

  <script>
    let bookingData = {};
    let bookedRooms = { 'A':new Set(), 'B':new Set(), 'C':new Set(), 'D':new Set(), 'E':new Set() };

    const blocks = { 'A':'Ladies', 'B':'Ladies', 'C':'Gents', 'D':'Gents', 'E':'Gents' };

    const roomTypes = [
      {name: "2-Person Room", price: 20000},
      {name: "3-Person Room", price: 16000},
      {name: "4-Person Room", price: 10000}
    ];

    function showBlocks() {
      const container = document.getElementById('block-options');
      container.innerHTML = Object.keys(blocks).map(b => `
        <div onclick="selectBlock('${b}')" class="cursor-pointer border-2 hover:border-blue-500 p-6 rounded-2xl text-center">
          <div class="text-3xl font-bold">Block ${b}</div>
          <div class="text-sm">${blocks[b]}</div>
        </div>
      `).join('');
    }

    function selectBlock(block) {
      bookingData.block = block;
      document.getElementById('current-block').textContent = `Block ${block}`;
      document.getElementById('room-type-area').classList.remove('hidden');
      
      const container = document.getElementById('room-type-options');
      container.innerHTML = roomTypes.map(rt => `
        <div onclick="selectRoomType('${rt.name}', ${rt.price})" class="border-2 hover:border-green-500 cursor-pointer p-6 rounded-3xl text-center">
          <h3 class="font-bold">${rt.name}</h3>
          <p class="text-3xl font-bold text-green-600 mt-3">KSh ${rt.price}</p>
        </div>
      `).join('');
    }

    function selectRoomType(type, price) {
      bookingData.roomType = type;
      bookingData.amount = price;
      document.getElementById('room-number-area').classList.remove('hidden');
      renderRoomNumbers();
    }

    function renderRoomNumbers() {
      const container = document.getElementById('room-grid');
      container.innerHTML = '';
      const block = bookingData.block;
      const vacant = 900 - bookedRooms[block].size;
      document.getElementById('vacant-count').textContent = vacant;

      for (let i = 1; i <= 900; i++) {
        const isBooked = bookedRooms[block].has(i);
        const btn = document.createElement('button');
        btn.className = `room-btn w-12 h-12 text-sm border rounded-xl ${isBooked ? 'room-booked' : 'bg-white hover:bg-blue-100'}`;
        btn.textContent = i;
        if (!isBooked) {
          btn.onclick = () => {
            bookingData.roomNumber = i;
            alert(`Selected: Block ${block} - Room \( {i} ( \){bookingData.roomType})`);
          };
        }
        container.appendChild(btn);
      }
    }

    function submitBooking() {
      if (!bookingData.roomNumber) {
        alert("Please select a room number first");
        return;
      }
      const code = prompt("Enter M-Pesa Transaction Code:");
      if (code) {
        bookedRooms[bookingData.block].add(bookingData.roomNumber);
        alert(`✅ Booking Successful!\nReference: MMU${Math.floor(100000 + Math.random()*900000)}\nBlock ${bookingData.block} - Room ${bookingData.roomNumber}`);
      }
    }

    // Initialize
    window.onload = showBlocks;
  </script>
</body>
</html>
